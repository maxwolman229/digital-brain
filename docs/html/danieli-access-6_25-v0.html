<style>
  :root{--cream:#F4F1ED;--navy:#162338;--orange:#F0531C;--hair:#E2DED7;--muted:#8a8377;}
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0;background:var(--cream);color:var(--navy);
    font-family:"IBM Plex Sans",system-ui,sans-serif;-webkit-font-smoothing:antialiased;
    display:flex;align-items:center;justify-content:center;padding:24px;}
  .gate{width:100%;max-width:340px;text-align:center;}
  .logo{width:210px;max-width:70%;height:auto;margin:0 auto 34px;display:block;}
  .prompt{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
  .row{display:flex;gap:8px;}
  input[type=password]{flex:1;min-width:0;font-family:inherit;font-size:15px;color:var(--navy);
    background:#fff;border:1.5px solid var(--hair);border-radius:6px;padding:11px 13px;outline:none;transition:border-color .12s;}
  input[type=password]:focus{border-color:var(--navy);}
  button{font-family:inherit;font-size:14px;font-weight:600;color:#fff;background:var(--navy);
    border:none;border-radius:6px;padding:11px 18px;cursor:pointer;transition:background .12s;}
  button:hover{background:#0e1828;}
  .err{height:16px;margin-top:12px;font-size:12px;color:var(--orange);opacity:0;transition:opacity .12s;}
  .err.show{opacity:1;}
  .foot{margin-top:42px;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
  .shake{animation:shake .35s;}
  @keyframes shake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-6px);}40%,80%{transform:translateX(6px);}}
  @media(prefers-reduced-motion:reduce){.shake{animation:none;}}
</style>
